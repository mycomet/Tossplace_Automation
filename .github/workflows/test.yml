name: CI - Test Automation

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run tests with Allure
      run: |
        pytest -m "not device" --alluredir=allure-results || true

    - name: Install Allure CLI
      run: |
        npm install -g allure-commandline --save-dev

    - name: Generate Allure Report
      run: |
        allure generate allure-results -o allure-report

    - name: Deploy CI report to gh-pages
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"

        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} gh-pages
        cd gh-pages

        git fetch origin gh-pages || true
        git checkout gh-pages || git checkout -b gh-pages

        mkdir -p ci
        rm -rf ci/*

        cp -r $GITHUB_WORKSPACE/allure-report/* ci/

        git add .
        git commit -m "deploy: update CI test report" || echo "No changes"
        git push origin gh-pages