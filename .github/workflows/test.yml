name: CI - Test Automation

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Check test collection
      run: |
        pytest --collect-only

    - name: Run non-device tests
      run: |
        pytest -m "not device" --disable-warnings || true